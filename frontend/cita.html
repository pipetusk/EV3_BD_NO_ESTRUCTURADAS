<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/images/nube.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/lumen.css">
    <link rel="stylesheet" href="./css/estilos.css">
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="./js/jQuery v4.0.0.js"></script>
    <script src="./js/cita.js"></script>
    
    <title>Registro de citas médicas</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
        <div class="container-fluid">
        <a class="navbar-brand">Felipe Huenchuleo</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="./formulario.html">Registro Usuario</a></li>
                    <li class="nav-item"><a class="nav-link" href="./listado.html">Listado Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link active" href="./cita.html">Registrar Cita</a></li>
                    <li class="nav-item"><a class="nav-link" href="./listado_citas.html">Listado Citas</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <br>

    <div class="container">
        <div class="row col">
            <div class="alert alert-danger" role="alert" id="errorFormulario" style="display: none;">
                <p>Revise los siguientes errores en su formulario:</p>
                <ul id="listaErrores"></ul>
            </div>
        </div>

        <form id="formularioCita">
            <p class="h1">Registro de citas médicas</p>
            <hr>

            <div class="container">
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label" for="selectUsuario">* Seleccionar paciente:</label>
                        <select class="form-select" name="usuario" id="selectUsuario" onchange="validarInput(this)">
                            <option selected value="">Seleccione el paciente</option>
                        </select>
                    </div>
                    <div class="col">
                        <label for="input_especialidad" class="form-label">* Especialidad:</label>
                        <input class="form-control" type="text" name="especialidad" id="input_especialidad" onchange="validarInput(this)" placeholder="Ingrese la especialidad">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label for="input_medico" class="form-label">* Médico:</label>
                        <input class="form-control" type="text" name="medico" id="input_medico" onchange="validarInput(this)" placeholder="Ingrese el nombre del médico">
                    </div>
                    <div class="col">
                        <label for="input_centro" class="form-label">* Centro médico:</label>
                        <input class="form-control" type="text" name="centroMedico" id="input_centro" onchange="validarInput(this)" placeholder="Ingrese la clínica u hospital">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label for="input_fecha" class="form-label">* Fecha:</label>
                        <input class="form-control" type="date" name="fecha" id="input_fecha" onchange="validarInput(this)">
                    </div>
                    <div class="col">
                        <label for="input_hora" class="form-label">* Hora:</label>
                        <input class="form-control" type="time" name="hora" id="input_hora" onchange="validarInput(this)">
                    </div>
                    <div class="col">
                        <label for="input_costo" class="form-label">* Costo:</label>
                        <input class="form-control" type="number" name="costo" id="input_costo" onchange="validarInput(this)" placeholder="Monto total">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label for="input_diagnostico" class="form-label">Diagnóstico:</label>
                        <textarea class="form-control" name="diagnostico" id="input_diagnostico" rows="2"></textarea>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label for="input_tratamiento" class="form-label">Tratamiento:</label>
                        <textarea class="form-control" name="tratamiento" id="input_tratamiento" rows="2"></textarea>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label for="input_observaciones" class="form-label">Observaciones:</label>
                        <textarea class="form-control" name="observaciones" id="input_observaciones" rows="2"></textarea>
                    </div>
                </div>

                <div class="row">
                    <div class="col d-flex justify-content-end">
                        <button type="button" class="btn btn-secondary me-2">Cancelar</button>
                        <button type="button" class="btn btn-primary" onclick="validarFormularioCita()">Guardar cita</button>
                    </div>
                </div>
                <hr>
                <div class="row">
                    <div class="col"><p>Los campos marcados con <strong>*</strong> son requeridos.</p></div>
                </div>
                <br>
            </div>
        </form>
    </div>
</body>
</html>
